worker_processes auto;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile        on;
  keepalive_timeout  65;
  server_tokens off;
  access_log /dev/stdout;
  error_log  /dev/stderr warn;

  server {
    listen 8080;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    client_max_body_size 20m;

    # Serve robots.txt from root
    location = /robots.txt {
      alias /var/www/html/robots.txt;
      default_type text/plain;
    }

    # Root URL — index.php checks hostname to serve landing page (wabees.live) or API JSON (api.wabees.live)
    location = / {
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
      fastcgi_pass 127.0.0.1:9000;
      fastcgi_read_timeout 120s;
    }

    # /download/ path — serve landing page on wabees.live, redirect on api.wabees.live
    location = /download/ {
      # On wabees.live, serve the download page directly
      if ($host = "wabees.live") {
        rewrite ^ / last;
      }
      # On api.wabees.live, redirect to wabees.live
      return 301 https://wabees.live;
    }
    location = /download/index.php {
      return 301 https://wabees.live;
    }

    # Download API (track_download, visitor_count, stream_file)
    location = /download/api.php {
      if ($arg_action = "stream_file") {
        rewrite ^ /download/wabees.apk last;
      }
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      fastcgi_pass 127.0.0.1:9000;
      fastcgi_read_timeout 120s;
    }

    # Serve APK files directly via Nginx (fast streaming)
    location ~* \.apk$ {
      add_header Content-Type application/vnd.android.package-archive;
      add_header Content-Disposition 'attachment; filename="wabees.apk"';
      sendfile on;
      tcp_nopush on;
    }

    location / {
      try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
      include fastcgi_params;
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
      fastcgi_pass 127.0.0.1:9000;
      fastcgi_read_timeout 120s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
      expires 7d;
      add_header Cache-Control "public, no-transform";
    }
  }
}
