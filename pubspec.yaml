name: wabees
description: WABEES - WhatsApp Business API Platform
publish_to: 'none'
version: 1.6.14+2037


environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase - Core
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7
  firebase_messaging: ^15.2.5
  firebase_analytics: ^11.5.3
  firebase_crashlytics: ^4.3.5
  firebase_storage: ^12.4.5

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Networking
  http: ^1.2.2
  dio: ^5.7.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  uuid: ^4.5.1
  package_info_plus: ^8.1.3

  # UI
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8
  lottie: ^3.3.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  google_sign_in: ^7.2.0
  just_audio: ^0.10.5
  record: ^6.2.0
  open_filex: ^4.7.0
  flutter_linkify: ^6.0.0
  shared_preferences: ^2.5.4
  home_widget: ^0.9.0
  flutter_webrtc: ^0.12.0
  characters: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#hex_code"
    theme_color: "#hex_code"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
