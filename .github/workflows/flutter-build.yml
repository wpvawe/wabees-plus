name: Flutter Build

on:
  push:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'android/**'
      - '.github/workflows/flutter-build.yml'
  workflow_dispatch:

jobs:
  analyze-and-build:
    name: Analyze & Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Decode release keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          cat > android/key.properties <<KP
          storeFile=app/release.jks
          storePassword=$RELEASE_STORE_PASSWORD
          keyAlias=$RELEASE_KEY_ALIAS
          keyPassword=$RELEASE_KEY_PASSWORD
          KP
          echo "✅ Release keystore configured"

      - name: Print signing SHA fingerprints (register these in Firebase Console)
        working-directory: android
        run: |
          echo "===================== SIGNING REPORT ====================="
          ./gradlew :app:signingReport 2>&1 | grep -E "Variant|Config|SHA1|SHA-256|Store" || true
          echo "=========================================================="

      - name: Analyze (non-blocking)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build APK (release, split-per-abi, compressed)
        run: flutter build apk --release --split-per-abi --shrink --obfuscate --split-debug-info=build/symbols

      - name: List built APKs with sizes
        run: |
          echo "=== Built APKs ==="
          ls -lh build/app/outputs/flutter-apk/*.apk

      - name: Upload split APKs
        uses: actions/upload-artifact@v5
        with:
          name: wabees-apks-split
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload debug symbols (for crash de-obfuscation)
        uses: actions/upload-artifact@v5
        with:
          name: wabees-debug-symbols
          path: build/symbols/
          if-no-files-found: warn
          retention-days: 30
